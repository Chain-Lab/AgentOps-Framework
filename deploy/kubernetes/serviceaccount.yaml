# Phase 64 — Kubernetes ServiceAccount for agent-app daemon
#
# Currently the daemon does NOT need access to the Kubernetes API.
# This ServiceAccount is for pod identity isolation only.
# No RoleBinding or ClusterRoleBinding is created.
#
# If future phases need K8s API access, add a Role/ClusterRole separately.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-app-daemon
  namespace: agent-app
  labels:
    app.kubernetes.io/name: agent-app-daemon
    app.kubernetes.io/part-of: agent-app-framework
