# Phase 64 — Kubernetes Secret for control token
#
# IMPORTANT: This is a placeholder. Do NOT commit real tokens.
# Create the secret in the cluster using:
#   kubectl create secret generic agent-app-daemon-secret \
#     --from-literal=AGENT_APP_CONTROL_TOKEN=<your-token-here> \
#     -n agent-app
#
# Or use an external secret manager (e.g., External Secrets Operator,
# HashiCorp Vault, AWS Secrets Manager).
apiVersion: v1
kind: Secret
metadata:
  name: agent-app-daemon-secret
  namespace: agent-app
  labels:
    app.kubernetes.io/name: agent-app-daemon
    app.kubernetes.io/part-of: agent-app-framework
type: Opaque
data:
  # Placeholder value — replace with real token (base64 encoded)
  # echo -n "your-token-here" | base64
  AGENT_APP_CONTROL_TOKEN: ZGV2LXRva2Vu
